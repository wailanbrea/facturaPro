<VirtualHost *:80>
    ServerName billing.example.com
    ServerAlias www.billing.example.com

    DocumentRoot "C:/xampp/php/www/FacturaPro/backend/public"

    <Directory "C:/xampp/php/www/FacturaPro/backend/public">
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
        DirectoryIndex index.php
    </Directory>

    ErrorLog "logs/facturapro-error.log"
    CustomLog "logs/facturapro-access.log" combined

    SetEnv APP_ENV production
</VirtualHost>
