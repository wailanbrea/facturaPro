<body class="bg-background min-h-screen flex flex-col md:hidden">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-on-background border-b border-outline-variant dark:border-outline flex justify-between items-center w-full px-margin_mobile h-16 sticky top-0 z-40">
<button class="text-on-surface-variant dark:text-surface-variant transition-colors duration-200 active:opacity-80 p-2 -ml-2 rounded-full hover:bg-surface-container-low dark:hover:bg-inverse-surface">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary dark:text-primary-fixed-dim tracking-tight">Facturación Pro</h1>
<button class="text-primary dark:text-primary-fixed-dim font-bold transition-colors duration-200 active:opacity-80 font-label-md text-label-md px-3 py-1.5 rounded-full hover:bg-surface-container-low dark:hover:bg-inverse-surface">NUEVA</button>
</header>
<!-- Main Content -->
<main class="flex-1 px-margin_mobile py-stack_md flex flex-col gap-stack_md pb-24">

<div class="relative w-full">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-full py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm transition-shadow" placeholder="Buscar por cliente o número..." type="text"/>
</div>
<!-- Quick Filters -->

<button class="bg-primary-container text-on-primary-container font-label-md text-label-md px-5 py-2 rounded-full whitespace-nowrap shadow-sm border border-transparent transition-transform active:scale-95">Todas</button>
<button class="bg-surface border border-outline-variant text-on-surface-variant hover:bg-surface-container-low font-label-md text-label-md px-5 py-2 rounded-full whitespace-nowrap transition-transform active:scale-95">Pagadas</button>
<button class="bg-surface border border-outline-variant text-on-surface-variant hover:bg-surface-container-low font-label-md text-label-md px-5 py-2 rounded-full whitespace-nowrap transition-transform active:scale-95">Pendientes</button>

</div>
<!-- Invoice List -->
<div class="flex flex-col gap-3 mt-2">
<!-- Card 1: Pagada -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-[12px] p-4 shadow-[0_4px_6px_-1px_rgb(0,0,0,0.05)] flex flex-col gap-2 relative transition-all active:scale-[0.98]">
<div class="flex justify-between items-start">
<div>
<span class="font-code-md text-code-md text-secondary">FAC-000042</span>
<h3 class="font-title-lg text-title-lg text-on-surface mt-1 tracking-tight">Acme Corporation</h3>
</div>
<div class="bg-secondary-container text-on-secondary-container px-2.5 py-1 rounded-full font-label-md text-[11px] font-bold tracking-wide uppercase flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-on-secondary-container"></span>

                    </div>
</div>
<div class="flex justify-between items-end mt-3 border-t border-outline-variant/30 pt-3">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant mb-0.5">Monto Total</span>
<span class="font-headline-md text-headline-md-mobile text-on-surface">$3,450.00 <span class="font-body-md text-body-md text-outline">USD</span></span>
</div>
<button class="text-outline hover:text-primary transition-colors p-2 -mr-2 -mb-2 rounded-full hover:bg-surface-container-low">
<span class="material-symbols-outlined" data-icon="picture_as_pdf">picture_as_pdf</span>
</button>
</div>
</div>

<div class="flex justify-between items-start">
<div>
<span class="font-code-md text-code-md text-secondary">FAC-000043</span>

<span class="material-symbols-outlined" data-icon="picture_as_pdf">picture_as_pdf</span>

</div>
