<style>
        /* Optional custom Google Font import if Tailwind config doesn't auto-load */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {

    body {

<body class="bg-surface text-on-background min-h-screen flex items-center justify-center antialiased selection:bg-primary-container selection:text-on-primary-container p-margin_mobile">
<!-- Main Container -->
<main class="w-full max-w-sm flex flex-col items-center">
<!-- Logo / Brand Header -->
<div class="flex flex-col items-center mb-stack_lg">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-stack_sm shadow-sm">
<span class="material-symbols-outlined text-on-primary-container" style="font-size: 32px; font-variation-settings: 'FILL' 1;">receipt_long</span>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary">FacturaPro</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1 text-center">Gestión financiera eficiente</p>
</div>
<!-- Login Form -->
<form class="w-full flex flex-col gap-stack_md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="relative w-full group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl pl-12 pr-4 py-3.5 font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="email" placeholder="Correo Electrónico" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="relative w-full group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl pl-12 pr-12 py-3.5 font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" id="password" placeholder="Contraseña" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none rounded-full p-1 focus:ring-2 focus:ring-primary-container" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="visibility-icon">visibility_off</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="w-full flex justify-end">
<a class="font-label-md text-label-md text-primary font-medium hover:text-on-primary-fixed-variant transition-colors hover:underline underline-offset-2" href="#">
                    ¿Olvidaste tu contraseña?
                </a>
</div>
<!-- Submit Button -->
<button class="w-full mt-4 bg-primary text-on-primary font-title-lg text-title-lg py-3.5 rounded-full hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all shadow-md flex justify-center items-center gap-2" type="submit">
                Iniciar Sesión
            </button>
</form>
<!-- Footer / Sign Up Link -->
<div class="mt-stack_lg font-body-md text-body-md text-on-surface-variant">
            ¿No tienes cuenta? 
            <a class="text-primary font-medium hover:text-on-primary-fixed-variant transition-colors hover:underline underline-offset-2" href="#">Regístrate</a>
</div>
</main>
<!-- Simple interaction script -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
